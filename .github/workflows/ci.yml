name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test with coverage
        run: pytest tests/ -v --tb=short --cov=iil_testkit --cov-report=term-missing --cov-fail-under=80 --ignore=tests/plugin

      - name: Plugin tests (pytester)
        run: pytest plugin_tests/ -v --tb=short --no-cov --override-ini="DJANGO_SETTINGS_MODULE="

      - name: Type check
        run: mypy iil_testkit/ --ignore-missing-imports
        continue-on-error: true
